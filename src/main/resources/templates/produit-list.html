<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des Produits</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">

<div th:fragment="content" class="max-w-7xl mx-auto">

    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Gestion des Produits</h2>
        <a th:href="@{/produits/ajoute}"
           class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">
            Ajouter un Produit
        </a>
    </div>


    <div class="overflow-x-auto bg-white rounded-xl shadow">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-800 text-white">
            <tr>
                <th class="px-6 py-3 text-left text-sm font-medium">ID</th>
                <th class="px-6 py-3 text-left text-sm font-medium">Nom</th>
                <th class="px-6 py-3 text-left text-sm font-medium">Catégorie</th>
                <th class="px-6 py-3 text-left text-sm font-medium">Prix</th>
                <th class="px-6 py-3 text-left text-sm font-medium">Quantité</th>
                <th class="px-6 py-3 text-left text-sm font-medium">Actions</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
            <tr th:each="produit : ${produits}" class="hover:bg-gray-100">
                <td class="px-6 py-4" th:text="${produit.id}">1</td>
                <td class="px-6 py-4" th:text="${produit.nom}">Nom</td>
                <td class="px-6 py-4" th:text="${produit.category}">Catégorie</td>
                <td class="px-6 py-4" th:text="${produit.prix}">0.00</td>
                <td class="px-6 py-4" th:text="${produit.quantite}">0</td>
                <td class="px-6 py-4 space-x-2">
                    <a th:href="@{/produits/modifie/{id}(id=${produit.id})}"
                       class="bg-yellow-400 hover:bg-yellow-500 text-white px-3 py-1 rounded-lg text-sm">
                        Modifier
                    </a>
                    <a th:href="@{/produits/supprime/{id}(id=${produit.id})}"
                       onclick="return confirm('Êtes-vous sûr ?')"
                       class="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded-lg text-sm">
                        Supprimer
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
<div class="mt-6">
    <a th:href="@{/}" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">Retour</a>
</div>
</body>
</html>
