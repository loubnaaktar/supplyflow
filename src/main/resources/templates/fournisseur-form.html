<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulaire Fournisseur</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center"
        th:text="'Ajouter un fournisseur'"></h2>

    <form th:action="@{/fournisseurs/sauvegarder}" th:object="${fournisseur}" method="post" class="space-y-4">
        <input type="hidden" th:field="*{id}" />

        <div>
            <label class="block text-gray-700 font-medium mb-1">Nom</label>
            <input type="text" th:field="*{nom}" required
                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-gray-700 font-medium mb-1">ville</label>
            <input type="text" th:field="*{ville}" required
                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-gray-700 font-medium mb-1">Téléphone</label>
            <input type="text"  th:field="*{phone}" required
                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="flex justify-between mt-6">
            <button  type="submit"
                     class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2 rounded-lg">
                Enregistrer
            </button>
            <a th:href="@{/fournisseurs}"
               class="bg-gray-400 hover:bg-gray-500 text-white font-semibold px-6 py-2 rounded-lg text-center">
                Annuler
            </a>
        </div>
    </form>
</div>

</body>
</html>
