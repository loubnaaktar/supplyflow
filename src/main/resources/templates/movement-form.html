<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulaire Mouvement</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">

    <h2 class="text-2xl font-bold mb-6 text-center">
        Enregistrer une Entrée ou Sortie de Stock
    </h2>

    <div class="bg-red-100 text-red-700 px-4 py-2 rounded mb-4"
         th:if="${error}"
         th:text="${error}">
    </div>

    <form th:action="@{/movements/sauvegarder}" method="post" class="space-y-4">

        <div>
            <label class="block text-gray-700 font-medium mb-1">Produit</label>

            <select name="productId"
                    id="productId"
                    required
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">

                <option value="" disabled selected>
                    Choisir un produit...
                </option>

                <option th:each="p : ${produits}"
                        th:value="${p.id}"
                        th:text="${p.nom + ' (Stock: ' + p.quantite + ')'}">
                </option>

            </select>
        </div>

        <div>
            <label class="block text-gray-700 font-medium mb-1">Quantité</label>

            <input type="number"
                   name="quantite"
                   id="quantite"
                   min="1"
                   required
                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-gray-700 font-medium mb-1">
                Type de Mouvement
            </label>

            <select name="type"
                    id="type"
                    required
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">

                <option value="entree">Entrée de Stock</option>
                <option value="sortie">Sortie de Stock</option>

            </select>
        </div>

        <div class="flex justify-between mt-6">

            <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2 rounded-lg">
                Valider
            </button>

            <a th:href="@{/movements}"
               class="bg-gray-400 hover:bg-gray-500 text-white font-semibold px-6 py-2 rounded-lg text-center">
                Annuler
            </a>

        </div>

    </form>

</div>

</body>
</html>
