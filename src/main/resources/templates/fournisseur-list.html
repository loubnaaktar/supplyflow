<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des fournisseurs</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">

<div class="max-w-7xl mx-auto">

    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Gestion des fournisseurs</h2>
        <a th:href="@{/fournisseurs/ajouter}"
           class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">
            Ajouter un fournisseur
        </a>
    </div>


    <div class="overflow-x-auto bg-white rounded-xl shadow">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-800 text-white">
            <tr>
                <th class="px-6 py-3 text-left text-sm font-medium">ID</th>
                <th class="px-6 py-3 text-left text-sm font-medium">Nom</th>
                <th class="px-6 py-3 text-left text-sm font-medium">ville</th>
                <th class="px-6 py-3 text-left text-sm font-medium">N° de téléphone</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
            <tr th:each="fournisseur : ${fournisseurs}" class="hover:bg-gray-100">
                <td class="px-6 py-4" th:text="${fournisseur.id}">1</td>
                <td class="px-6 py-4" th:text="${fournisseur.nom}">Nom</td>
                <td class="px-6 py-4" th:text="${fournisseur.ville}">Ville</td>
                <td class="px-6 py-4" th:text="${fournisseur.phone}">Phone</td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
<div class="mt-6">
    <a th:href="@{/}" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">Retour</a>
</div>
</body>
</html>
